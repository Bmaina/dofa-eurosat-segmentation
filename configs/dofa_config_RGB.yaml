seed_everything: true

trainer:
  accelerator: "cpu"
  devices: 1
  gradient_clip_val: 1.0
  precision: 32
  max_epochs: 5
  logger:
    class_path: lightning.pytorch.loggers.CSVLogger
    init_args:
      save_dir: logs
      name: "gdl_experiment"
  callbacks:
    - class_path: lightning.pytorch.callbacks.EarlyStopping
      init_args:
        monitor: "val_loss"
        mode: "min"
        verbose: False
        patience: 5
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        monitor: "val_loss"
        mode: "min"
        save_top_k: 1
        filename: "model-{epoch:02d}-{val_loss:.3f}"

model:
  class_path: tasks_with_models.segmentation_dofa.SegmentationDOFA
  init_args:
    encoder: "dofa_base"
    pretrained: True
    image_size: [64, 64]
    num_classes: 10
    max_samples: 2
    freeze_layers: ["encoder"]
    loss:
      class_path: segmentation_models_pytorch.losses.DiceLoss
      init_args:
        mode: "multiclass"
    optimizer:
      class_path: torch.optim.Adam
      init_args:
        lr: 6e-5
    scheduler:
      class_path: torch.optim.lr_scheduler.ReduceLROnPlateau
      init_args:
        mode: "min"
        factor: 0.1
        patience: 3
        cooldown: 1
        min_lr: 6e-8
    scheduler_config:
      interval: "epoch"
      frequency: 1
      monitor: "val_loss"
    class_labels: ["AnnualCrop", "Forest", "HerbaceousVegetation", "Highway", "Industrial", "Pasture", "PermanentCrop", "Residential", "River", "SeaLake"]
    class_colors: ["#FF0000", "#008000", "#90EE90", "#FFFF00", "#808080", "#90EE90", "#006400", "#FFA500", "#0000FF", "#00FFFF"]
    weights_from_checkpoint_path: null

data:
  class_path: datamodules.csv_datamodule.CSVDataModule
  init_args:
    batch_size: 4
    num_workers: 0
    data_type_max: 255
    patch_size:
      - 64
      - 64
    mean:
      - 0.3992
      - 0.4283
      - 0.3998
    std:
      - 0.1672
      - 0.1800
      - 0.1584
    csv_root_folder: C:\geo-deep-learning\data
    patches_root_folder: C:\geo-deep-learning\data